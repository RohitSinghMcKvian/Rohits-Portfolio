<section class="hero">
  <div class="hero-bg"></div>

  <!-- Floating shapes -->
  <div class="hero-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="shape shape-5"></div>
    <div class="shape shape-6"></div>
  </div>

  <!-- Animated rings -->
  <div class="hero-rings">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
  </div>

  <div class="hero-particles">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <div class="hero-greeting">
      <span class="greeting-dot"></span>
      <span>Available for Opportunities</span>
    </div>

    <h1 class="hero-name">{{ heroData.name }}</h1>

    <div class="hero-title-wrapper">
      <span class="hero-title">{{ heroData.title }}</span>
    </div>

    <p class="hero-tagline">{{ heroData.tagline }}</p>

    <div class="hero-actions">
      <a [href]="'mailto:' + heroData.email" class="btn-accent ripple">
        <i class="fas fa-envelope"></i> Get in Touch
      </a>
      <a [href]="heroData.github" target="_blank" rel="noopener noreferrer" class="btn-outline">
        <i class="fab fa-github"></i> View GitHub
      </a>
    </div>

    <div class="hero-contact-info">
      <div class="contact-item">
        <i class="fas fa-envelope"></i>
        <a [href]="'mailto:' + heroData.email">{{ heroData.email }}</a>
      </div>
      <div class="contact-item">
        <i class="fas fa-phone"></i>
        <span>{{ heroData.phone }}</span>
      </div>
      <div class="contact-item">
        <i class="fas fa-map-marker-alt"></i>
        <span>{{ heroData.location }}</span>
      </div>
    </div>

    <div class="hero-social">
      <a [href]="'mailto:' + heroData.email" aria-label="Email" class="social-link">
        <i class="fas fa-envelope"></i>
      </a>
      <a [href]="heroData.linkedin" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" class="social-link">
        <i class="fab fa-linkedin-in"></i>
      </a>
      <a [href]="heroData.github" target="_blank" rel="noopener noreferrer" aria-label="GitHub" class="social-link">
        <i class="fab fa-github"></i>
      </a>
    </div>

    <div class="scroll-indicator">
      <span class="scroll-text">Scroll to explore</span>
      <i class="fas fa-chevron-down"></i>
    </div>
  </div>
</section>
